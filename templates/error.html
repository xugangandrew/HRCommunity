{% extends "base.html" %}
{% block title %}{{ code }} · {{ site.name }}{% endblock %}

{% block content %}
<div class="error-page">
  <div class="code">{{ code }}</div>
  <h2>{% if code == 404 %}页面不存在{% elif code == 403 %}没有访问权限{% else %}出错了{% endif %}</h2>
  <p>{{ message }}</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary">返回首页</a>
</div>
{% endblock %}
